name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.3'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Run tests
        run: pnpm test
        env:
          PLAYWRIGHT: True

      - name: Generate changelog and create release
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: ai-chatbot
          changelog-types: |
            [
              {"type":"feat","section":"✨ Features","hidden":false},
              {"type":"fix","section":"🐛 Bug Fixes","hidden":false},
              {"type":"perf","section":"⚡ Performance Improvements","hidden":false},
              {"type":"revert","section":"⏪ Reverts","hidden":false},
              {"type":"docs","section":"📚 Documentation","hidden":false},
              {"type":"style","section":"🎨 Styles","hidden":false},
              {"type":"refactor","section":"♻️ Code Refactoring","hidden":false},
              {"type":"test","section":"🧪 Tests","hidden":false},
              {"type":"build","section":"🔧 Build System","hidden":false},
              {"type":"ci","section":"👷 CI/CD","hidden":false},
              {"type":"chore","section":"🔨 Chores","hidden":true}
            ]

      - name: Create GitHub Release
        if: steps.release.outputs.release_created
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          release_name: ${{ steps.release.outputs.tag_name }}
          body: ${{ steps.release.outputs.body }}
          draft: false
          prerelease: false

      - name: Upload build artifacts to release
        if: steps.release.outputs.release_created
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./.next
          asset_name: build-artifacts.zip
          asset_content_type: application/zip

      - name: Notify on release
        if: steps.release.outputs.release_created
        run: |
          echo "🎉 New release created: ${{ steps.release.outputs.tag_name }}"
          echo "📝 Release notes: ${{ steps.release.outputs.html_url }}"

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_created
    steps:
      - name: Notify deployment channels
        run: |
          echo "🚀 Deployment notification would be sent here"
          echo "Consider integrating with Slack, Discord, or email notifications"