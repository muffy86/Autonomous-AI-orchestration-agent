name: A2A Bridge

on:
  repository_dispatch:
    types: [agent_request]
  workflow_dispatch:
    inputs:
      request:
        description: 'What do you need?'
        required: true
        type: string
      from_agent:
        description: 'Who is asking?'
        required: false
        type: string
        default: 'human'

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
  security-events: read
  checks: read

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Parse request
        id: parse
        run: |
          REQ="${{ github.event.inputs.request || github.event.client_payload.request }}"
          FROM="${{ github.event.inputs.from_agent || github.event.client_payload.from_agent || 'unknown' }}"
          echo "request=$REQ" >> $GITHUB_OUTPUT
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "Action: ${{ github.event.action }}"
          echo ":inbox_tray: A2A from $FROM: $REQ"
      - name: Security scan - REAL handler
        if: contains(steps.parse.outputs.request, 'security') || contains(steps.parse.outputs.request, 'audit') || contains(steps.parse.outputs.request, 'scan')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = ['## :mag: Security Audit for ' + context.repo.repo];
            result.push('Triggered by: `' + '${{ steps.parse.outputs.from }}`');
            result.push('');
            // Try to get Dependabot alerts
            try {
              const alerts = await github.rest.dependabot.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 30
              });
              result.push('### Dependabot alerts: **' + alerts.data.length + '**');
              const bySev = {};
              alerts.data.forEach(a => bySev[a.security_advisory.severity] = (bySev[a.security_advisory.severity] || 0) + 1);
              Object.entries(bySev).sort().forEach(([k,v]) => result.push('- ' + k + ': ' + v));
              if (alerts.data.length > 0) {
                result.push('');
                result.push('| GHSA | Severity | Package | Summary |');
                result.push('|------|----------|---------|---------|');
                alerts.data.slice(0, 10).forEach(a => {
                  result.push('| ' + a.security_advisory.ghsa_id + ' | ' + a.security_advisory.severity + ' | `' + a.dependency.package.name + '` | ' + a.security_advisory.summary.slice(0, 80) + ' |');
                });
              }
            } catch (e) { result.push('### Dependabot: (no access - ' + e.status + ')'); }
            // Code scanning
            try {
              const codeAlerts = await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 5
              });
              result.push('');
              result.push('### Code scanning alerts: **' + codeAlerts.length + '**');
            } catch (e) { result.push('### Code scanning: (no access)'); }
            // Secret scanning
            try {
              const secAlerts = await github.rest.secretScanning.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 5
              });
              result.push('### Secret scanning alerts: **' + secAlerts.length + '**');
            } catch (e) { result.push('### Secret scanning: (no access)'); }
            // Create the issue
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '[A2A] :mag: Security audit (' + new Date().toISOString().slice(0,10) + ')',
              body: result.join('\n'),
              labels: ['a2a-response', 'security']
            });
            core.setOutput('issue_number', issue.data.number);
            console.log('Created issue #' + issue.data.number);
      - name: Test - REAL handler
        if: contains(steps.parse.outputs.request, 'test') || contains(steps.parse.outputs.request, 'check') || contains(steps.parse.outputs.request, 'ci')
        run: |
          echo ":test_tube: Triggering CI workflow..."
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ci.yml/dispatches \
            -d '{"ref":"main"}' || echo "  (no ci.yml workflow or no permission)"
      - name: Deploy - REAL handler
        if: contains(steps.parse.outputs.request, 'deploy') || contains(steps.parse.outputs.request, 'release')
        run: |
          echo ":rocket: Deployment requested - dispatching deploy event"
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"deploy_request","client_payload":{"from":"${{ steps.parse.outputs.from }}"}}' || echo "  (dispatch failed)"
      - name: Reply to caller
        if: github.event.client_payload.reply_to != ''
        uses: actions/github-script@v7
        with:
          script: |
            const reply = '${{ github.event.client_payload.reply_to }}';
            if (reply && reply.includes('/')) {
              const [owner, repo] = reply.split('/');
              try {
                await github.rest.repos.createDispatchEvent({
                  owner, repo,
                  event_type: 'agent_response',
                  client_payload: {
                    source_repo: context.repo.repo,
                    request_id: '${{ github.event.client_payload.request_id }}',
                    from: '${{ steps.parse.outputs.from }}',
                    result: 'Processed: ${{ steps.parse.outputs.request }}'
                  }
                });
                console.log('Replied to ' + reply);
              } catch (e) { console.log('Could not reply: ' + e.message); }
            }
