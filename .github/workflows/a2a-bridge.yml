name: A2A Bridge

on:
  repository_dispatch:
    types: [agent_request]
  workflow_dispatch:
    inputs:
      request:
        description: 'What do you need?'
        required: true
        type: string
      from_agent:
        description: 'Who is asking?'
        required: false
        type: string
        default: 'human'

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Parse request
        id: parse
        run: |
          if [ -n "${{ github.event.inputs.request }}" ]; then
            echo "request=${{ github.event.inputs.request }}" >> $GITHUB_OUTPUT
            echo "from=${{ github.event.inputs.from_agent }}" >> $GITHUB_OUTPUT
          else
            echo "request=${{ github.event.client_payload.request }}" >> $GITHUB_OUTPUT
            echo "from=${{ github.event.client_payload.from_agent }}" >> $GITHUB_OUTPUT
          fi
      - name: Echo
        run: |
          echo ":envelope: A2A from ${{ steps.parse.outputs.from }}"
          echo "Request: ${{ steps.parse.outputs.request }}"
      - name: Security scan
        if: contains(steps.parse.outputs.request, 'security') || contains(steps.parse.outputs.request, 'audit') || contains(steps.parse.outputs.request, 'scan')
        uses: actions/github-script@v7
        with:
          script: |
            const alerts = await github.rest.dependabot.listAlertsForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 10
            });
            const body = alerts.data.length 
              ? alerts.data.map(a => '- ' + a.security_advisory.ghsa_id + ' (' + a.security_advisory.severity + '): ' + a.security_advisory.summary).join('\n')
              : 'No open alerts.';
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '[A2A] Security audit: ' + alerts.data.length + ' alerts in ' + context.repo.repo,
              body: body, labels: ['a2a-response', 'security']
            });
      - name: Log unknown
        if: |
          !contains(steps.parse.outputs.request, 'security') &&
          !contains(steps.parse.outputs.request, 'audit') &&
          !contains(steps.parse.outputs.request, 'scan') &&
          !contains(steps.parse.outputs.request, 'deploy') &&
          !contains(steps.parse.outputs.request, 'test')
        run: |
          echo "Request type not handled: ${{ steps.parse.outputs.request }}"
