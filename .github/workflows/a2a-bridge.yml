name: A2A Bridge

on:
  repository_dispatch:
    types: [agent_request]
  workflow_dispatch:
    inputs:
      request:
        description: 'What do you need?'
        required: true
        type: string
      from_agent:
        description: 'Who is asking?'
        required: false
        type: string
        default: 'human'

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read
  security-events: read
  dependabot-secrets: read

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Parse request
        id: parse
        run: |
          if [ -n "${{ github.event.inputs.request }}" ]; then
            echo "request=${{ github.event.inputs.request }}" >> $GITHUB_OUTPUT
            echo "from=${{ github.event.inputs.from_agent }}" >> $GITHUB_OUTPUT
          else
            echo "request=${{ github.event.client_payload.request }}" >> $GITHUB_OUTPUT
            echo "from=${{ github.event.client_payload.from_agent }}" >> $GITHUB_OUTPUT
          fi
      - name: Echo
        run: |
          echo ":envelope: A2A from ${{ steps.parse.outputs.from }}"
          echo "Request: ${{ steps.parse.outputs.request }}"
      - name: Security scan (Dependabot + Code scanning)
        if: |
          contains(steps.parse.outputs.request, 'security') ||
          contains(steps.parse.outputs.request, 'audit') ||
          contains(steps.parse.outputs.request, 'scan')
        uses: actions/github-script@v7
        with:
          script: |
            const summary = ['*Security audit for ' + context.repo.repo + '*'];
            try {
              const alerts = await github.rest.dependabot.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 10
              });
              summary.push('## Dependabot alerts: ' + alerts.data.length);
              alerts.data.forEach(a => summary.push('- **' + a.security_advisory.ghsa_id + '** (' + a.security_advisory.severity + '): ' + a.security_advisory.summary));
            } catch (e) { summary.push('## Dependabot alerts: (no access - ' + e.status + ')'); }
            try {
              const codeAlerts = await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 5
              });
              summary.push('## Code scanning alerts: ' + codeAlerts.data.length);
            } catch (e) { summary.push('## Code scanning alerts: (no access)'); }
            try {
              const secAlerts = await github.rest.secretScanning.listAlertsForRepo({
                owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 5
              });
              summary.push('## Secret scanning alerts: ' + secAlerts.data.length);
            } catch (e) { summary.push('## Secret scanning alerts: (no access)'); }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '[A2A] Security audit: ' + context.repo.repo,
              body: summary.join('\n'),
              labels: ['a2a-response', 'security']
            });
      - name: Deploy handler
        if: contains(steps.parse.outputs.request, 'deploy') || contains(steps.parse.outputs.request, 'release')
        run: |
          echo ":rocket: Deploy request - trigger deployment"
      - name: Test handler
        if: contains(steps.parse.outputs.request, 'test') || contains(steps.parse.outputs.request, 'check')
        run: |
          echo ":test_tube: Test request - would run CI"
      - name: Unknown request
        if: |
          !contains(steps.parse.outputs.request, 'security') &&
          !contains(steps.parse.outputs.request, 'audit') &&
          !contains(steps.parse.outputs.request, 'scan') &&
          !contains(steps.parse.outputs.request, 'deploy') &&
          !contains(steps.parse.outputs.request, 'test')
        run: |
          echo "Request type not handled: ${{ steps.parse.outputs.request }}"
