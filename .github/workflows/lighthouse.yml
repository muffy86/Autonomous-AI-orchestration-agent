name: Lighthouse CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.3'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Start application
        run: |
          pnpm start &
          sleep 10
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read Lighthouse results
            const resultsPath = '.lighthouseci';
            if (fs.existsSync(resultsPath)) {
              const files = fs.readdirSync(resultsPath);
              const reportFile = files.find(file => file.endsWith('.json'));
              
              if (reportFile) {
                const report = JSON.parse(fs.readFileSync(path.join(resultsPath, reportFile), 'utf8'));
                const scores = report.categories;
                
                const comment = `## 🔍 Lighthouse Performance Report
                
                | Category | Score |
                |----------|-------|
                | Performance | ${Math.round(scores.performance.score * 100)}/100 |
                | Accessibility | ${Math.round(scores.accessibility.score * 100)}/100 |
                | Best Practices | ${Math.round(scores['best-practices'].score * 100)}/100 |
                | SEO | ${Math.round(scores.seo.score * 100)}/100 |
                
                [View detailed report](${process.env.LHCI_BUILD_URL || 'Report will be available after CI completes'})
                `;
                
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            }