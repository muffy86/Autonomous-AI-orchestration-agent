name: Guard - Reject Copilot auto-PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  block-copilot-bot:
    if: github.actor == 'copilot-swe-agent[bot]' || startsWith(github.head_ref, 'copilot/')
    runs-on: ubuntu-latest
    steps:
      - name: Add do-not-merge label and comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['do-not-merge', 'copilot-bot-blocked', 'security-review-required']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🛑 **This PR was opened by Copilot Coding Agent.**\n\n' +
                    'As of 2026-06-07, Copilot Coding Agent is **disabled** on this repo due to a confirmed ' +
                    'supply-chain attack (Solana-C2 stealer, see SECURITY.md).\n\n' +
                    '**Action required from @muffy86:**\n' +
                    '1. Review the diff carefully (was a `preinstall.js` file added? Reject immediately if so)\n' +
                    '2. If the PR is legitimate work, remove the labels and approve manually\n' +
                    '3. Consider moving this work to a non-copilot branch'
            });
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
