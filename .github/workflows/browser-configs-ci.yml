name: Browser Configs CI/CD

on:
  push:
    branches: [main, develop, 'cursor/**']
    paths:
      - 'browser-configs/**'
      - 'Dockerfile.browser-automation'
      - '.github/workflows/browser-configs-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'browser-configs/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  validate-configs:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON files
        run: |
          for file in browser-configs/**/*.json; do
            echo "Validating $file"
            jq empty "$file" || exit 1
          done
      
      - name: Validate Chrome Extension Manifest
        run: |
          cd browser-configs/extensions/ai-tools
          jq empty manifest.json
          
          # Check required fields
          jq -e '.manifest_version' manifest.json
          jq -e '.name' manifest.json
          jq -e '.version' manifest.json
      
      - name: Validate Userscripts
        run: |
          for script in browser-configs/scripts/*.user.js; do
            echo "Checking $script"
            # Verify has required metadata
            grep -q "@name" "$script" || exit 1
            grep -q "@version" "$script" || exit 1
            grep -q "@match" "$script" || exit 1
          done
      
      - name: Check CSS Syntax
        run: |
          npm install -g css-validator
          for css in browser-configs/styles/*.css; do
            echo "Validating $css"
            # Basic syntax check
            node -e "require('fs').readFileSync('$css', 'utf8')" || exit 1
          done

  test-automation:
    name: Test Automation Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: browser-configs/automation/package-lock.json
      
      - name: Install dependencies
        working-directory: browser-configs/automation
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: browser-configs/automation
        run: npx playwright install --with-deps chromium
      
      - name: Run syntax checks
        working-directory: browser-configs/automation
        run: |
          node -c puppeteer-automation.js
          echo "✅ Syntax check passed"
      
      - name: Test basic automation
        working-directory: browser-configs/automation
        run: |
          # Create simple test
          cat > test.js << 'EOF'
          const BrowserAutomation = require('./puppeteer-automation');
          
          (async () => {
            const bot = new BrowserAutomation({ headless: true });
            try {
              await bot.launch();
              await bot.page.goto('https://example.com');
              const title = await bot.page.title();
              console.log('Page title:', title);
              if (!title) throw new Error('Failed to get title');
              await bot.close();
              console.log('✅ Test passed');
            } catch (error) {
              console.error('❌ Test failed:', error);
              process.exit(1);
            }
          })();
          EOF
          
          node test.js

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [validate-configs, test-automation]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.browser-automation
          push: false
          tags: browser-automation:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker build -f Dockerfile.browser-automation -t browser-automation:test .
          docker run --rm browser-automation:test node -e "console.log('Docker test passed')"

  extension-package:
    name: Package Chrome Extension
    runs-on: ubuntu-latest
    needs: validate-configs
    steps:
      - uses: actions/checkout@v4
      
      - name: Create extension package
        run: |
          cd browser-configs/extensions/ai-tools
          
          # Create icons directory and placeholder icons
          mkdir -p icons
          
          # Create a simple SVG icon and convert to PNG (if needed)
          # For now, just note that icons need to be added
          echo "Note: Add icon files to icons/ directory"
          
          # Zip extension
          zip -r ../../../ai-tools-extension.zip . -x "*.git*" "README.md"
          
          echo "✅ Extension packaged"
      
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: ai-tools-extension.zip
          retention-days: 30

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'browser-configs/'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check for secrets
        run: |
          # Check for potential API keys or secrets
          if grep -r "sk-" browser-configs/ --include="*.js" --include="*.json"; then
            echo "❌ Potential API key found!"
            exit 1
          fi
          echo "✅ No secrets detected"

  documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check documentation
        run: |
          # Verify all main docs exist
          test -f BROWSER_AI_CONFIGURATION.md
          test -f QUICK_START.md
          test -f browser-configs/docs/COMPREHENSIVE_GUIDE.md
          test -f browser-configs/README.md
          
          echo "✅ All documentation files present"
      
      - name: Check links in documentation
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
          folder-path: 'browser-configs/docs'
        continue-on-error: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-docker, extension-package, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension
      
      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' browser-configs/extensions/ai-tools/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: browser-configs-v${{ steps.version.outputs.version }}
          name: Browser AI Configs v${{ steps.version.outputs.version }}
          body: |
            ## Browser AI Configuration Release
            
            ### What's Included
            - ✅ Chrome Extension for AI Tools
            - ✅ Tampermonkey Scripts
            - ✅ Custom CSS Themes
            - ✅ Browser Automation Scripts
            - ✅ AI Models Integration
            - ✅ Analytics & Monitoring
            
            ### Installation
            See [QUICK_START.md](QUICK_START.md) for installation instructions.
            
            ### Documentation
            - [Full Configuration Guide](BROWSER_AI_CONFIGURATION.md)
            - [Comprehensive Guide](browser-configs/docs/COMPREHENSIVE_GUIDE.md)
          files: |
            ai-tools-extension.zip
            browser-configs/configs/*.json
            browser-configs/configs/*.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Status
    runs-on: ubuntu-latest
    needs: [validate-configs, test-automation, build-docker, extension-package]
    if: always()
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.validate-configs.result }}" == "success" ] && \
             [ "${{ needs.test-automation.result }}" == "success" ] && \
             [ "${{ needs.build-docker.result }}" == "success" ] && \
             [ "${{ needs.extension-package.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed"
            exit 1
          fi
