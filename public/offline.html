<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - AI Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #00ff88;
    }
    
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #a0a0a0;
      margin-bottom: 30px;
    }
    
    .features {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 255, 136, 0.2);
    }
    
    .feature {
      margin: 10px 0;
      font-size: 14px;
      color: #00ff88;
    }
    
    button {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🤖</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features are still available:</p>
    
    <div class="features">
      <div class="feature">✓ Local AI models (if Ollama is running)</div>
      <div class="feature">✓ Cached conversations</div>
      <div class="feature">✓ Offline tools</div>
      <div class="feature">✓ Browser automation</div>
    </div>
    
    <p>You can continue using local features or wait until you're back online.</p>
    
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
